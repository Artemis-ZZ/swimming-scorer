<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="游泳课成绩">
<link rel="manifest" href="manifest.json">
<title>游泳课成绩管理系统</title>
<style>
:root {
  --primary: #007AFF;
  --danger: #FF3B30;
  --success: #34C759;
  --warning: #FF9500;
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --text2: #8E8E93;
  --sep: #E5E5EA;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-tap-highlight-color: transparent;
  max-width: 900px; margin: 0 auto; padding-bottom: 80px;
}
header {
  background: var(--primary); color: #fff;
  padding: 12px 16px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 18px; font-weight: 600; }
header .count { font-size: 13px; opacity: .85; }
nav {
  display: flex; background: var(--card); border-bottom: 1px solid var(--sep);
  position: sticky; top: 44px; z-index: 99; overflow-x: auto;
}
nav button {
  flex: 1; min-width: fit-content; padding: 12px 10px; border: none;
  background: none; font-size: 14px; color: var(--text2); white-space: nowrap;
  border-bottom: 2px solid transparent; cursor: pointer; transition: .15s;
}
nav button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.page { display: none; padding: 12px; }
.page.active { display: block; }
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
}
.card h2 { font-size: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; margin-bottom: 8px; color: var(--text2); }
label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
input, select, textarea {
  width: 100%; padding: 10px 12px; border: 1px solid var(--sep);
  border-radius: 8px; font-size: 15px; font-family: inherit;
  background: var(--bg); -webkit-appearance: none;
}
input:focus, select:focus { outline: none; border-color: var(--primary); }
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 20px; border-radius: 8px; font-size: 15px; font-weight: 600;
  border: none; cursor: pointer; transition: .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline { background: none; border: 1.5px solid var(--primary); color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-block { width: 100%; margin-top: 8px; }
.btn:active { opacity: .7; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row > * { flex: 1; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--sep); }
th { font-weight: 600; color: var(--text2); font-size: 12px; white-space: nowrap; }
tr.disqualified { background: #FFF3F3; color: var(--danger); }
.score-good { color: var(--success); font-weight: 600; }
.score-bad { color: var(--danger); font-weight: 600; }
.tag {
  display: inline-block; padding: 2px 6px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
}
.tag-warn { background: #FFF3CD; color: #856404; }
.tag-danger { background: #FFE5E5; color: #C00; }
.tag-info { background: #E5F0FF; color: #004C99; }
.gap { gap: 8px; }
.mt { margin-top: 8px; }
.mb { margin-bottom: 8px; }
.hidden { display: none !important; }
.upload-area {
  border: 2px dashed var(--sep); border-radius: var(--radius);
  padding: 32px; text-align: center; cursor: pointer; transition: .15s;
}
.upload-area:hover { border-color: var(--primary); background: #F0F6FF; }
.upload-area .icon { font-size: 36px; margin-bottom: 8px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.stat-card {
  background: var(--card); border-radius: var(--radius); padding: 12px;
  text-align: center; box-shadow: var(--shadow);
}
.stat-card .num { font-size: 28px; font-weight: 700; color: var(--primary); }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.att-log { font-size: 13px; }
.att-log .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--sep); }
.att-log .row .remove-btn { color: var(--danger); cursor: pointer; font-size: 16px; }
input[type="file"] { display: none; }
@media (max-width: 480px) {
  .card { padding: 12px; }
  th, td { padding: 6px 4px; font-size: 11px; }
  .form-row { flex-direction: column; }
}
</style>
</head>
<body>

<header>
  <h1>🏊 游泳课成绩管理</h1>
  <span class="count" id="studentCount">0 名学生</span>
</header>

<nav id="nav">
  <button data-page="students" class="active">📋 学生</button>
  <button data-page="attendance">📅 考勤</button>
  <button data-page="fitness">💪 身体素质</button>
  <button data-page="swim">🏊 游泳</button>
  <button data-page="overview">📊 总览</button>
</nav>

<!-- ==================== 学生管理页 ==================== -->
<div class="page active" id="page-students">
  <div class="card">
    <h2>📥 导入学生</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:12px">
      支持 .xlsx / .xls 文件，表头需包含：<b>班级、姓名、学号、性别</b>
    </p>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📂</div>
      <div>点击上传 Excel 文件</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
    <div id="importPreview" class="mt hidden"></div>
  </div>

  <div class="card">
    <h2>✍️ 手动添加</h2>
    <div class="form-row">
      <div><label>班级</label><input id="mClass" placeholder="如: 计算机2201"></div>
      <div><label>姓名</label><input id="mName" placeholder="姓名"></div>
    </div>
    <div class="form-row">
      <div><label>学号</label><input id="mSid" placeholder="学号"></div>
      <div><label>性别</label><select id="mGender"><option value="男">男</option><option value="女">女</option></select></div>
    </div>
    <button class="btn btn-primary btn-block" onclick="addStudent()">➕ 添加</button>
    <p id="addMsg" style="font-size:12px;color:var(--danger);margin-top:4px"></p>
  </div>

  <div class="card" id="studentListCard">
    <h2>👥 学生列表 <span style="font-size:12px;color:var(--text2)" id="listInfo"></span></h2>
    <div style="overflow-x:auto">
      <table id="studentTable">
        <thead><tr><th>班级</th><th>姓名</th><th>学号</th><th>性别</th><th>操作</th></tr></thead>
        <tbody id="studentTbody"></tbody>
      </table>
    </div>
    <button class="btn btn-outline btn-sm mt" onclick="clearAll()">🗑 清空全部</button>
  </div>

  <div class="card">
    <h2>💾 数据备份 & 迁移</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:8px">
      导出备份：将在手机上的数据保存成文件 → 发送到电脑<br>
      导入恢复：打开电脑上的备份文件 → 数据同步到手机
    </p>
    <div class="form-row">
      <button class="btn btn-primary btn-block" onclick="exportData()">📤 导出数据</button>
      <button class="btn btn-outline btn-block" onclick="document.getElementById('importFileInput').click()">📥 导入数据</button>
    </div>
    <input type="file" id="importFileInput" accept=".json" onchange="importData(event)" style="display:none">
    <p id="importMsg" style="font-size:12px;color:var(--text2);margin-top:4px"></p>
  </div>
</div>

<!-- ==================== 考勤页 ==================== -->
<div class="page" id="page-attendance">
  <div class="card" id="attStudentSelector">
    <h2>选择学生</h2>
    <select id="attStudent" onchange="loadAttendance()">
      <option value="">-- 请选择 --</option>
    </select>
  </div>
  <div id="attContent" class="hidden">
    <div class="card">
      <h2 id="attTitle"></h2>
      <div class="stats-grid" id="attStats"></div>
    </div>
    <div class="card">
      <h2>➕ 添加考勤记录</h2>
      <div class="form-row">
        <div><label>类型</label><select id="attType"><option value="旷课">旷课</option><option value="病假">病假</option><option value="事假">事假</option><option value="公假">公假</option><option value="见习">见习(女)</option></select></div>
        <div><label>日期</label><input type="date" id="attDate"></div>
      </div>
      <div><label>备注</label><input id="attNote" placeholder="可选"></div>
      <button class="btn btn-primary btn-block mt" onclick="addAttendance()">➕ 添加记录</button>
    </div>
    <div class="card">
      <h2>📋 考勤记录</h2>
      <div class="att-log" id="attLog"></div>
    </div>
  </div>
</div>

<!-- ==================== 身体素质页 ==================== -->
<div class="page" id="page-fitness">
  <div class="card">
    <h2>选择学生</h2>
    <select id="fitStudent" onchange="loadFitness()">
      <option value="">-- 请选择 --</option>
    </select>
  </div>
  <div id="fitContent" class="hidden">
    <div class="card">
      <h2 id="fitTitle"></h2>
      <p style="font-size:12px;color:var(--text2);margin-bottom:8px">输入原始成绩，系统自动对照评分表算出分数</p>
      <div id="fitInputs"></div>
      <button class="btn btn-primary btn-block" onclick="saveFitness()">💾 保存</button>
    </div>
  </div>
</div>

<!-- ==================== 游泳页 ==================== -->
<div class="page" id="page-swim">
  <div class="card">
    <h2>选择学生</h2>
    <select id="swimStudent" onchange="loadSwim()">
      <option value="">-- 请选择 --</option>
    </select>
  </div>
  <div id="swimContent" class="hidden">
    <div class="card">
      <h2 id="swimTitle"></h2>
      <div id="swimInputs"></div>
      <button class="btn btn-primary btn-block" onclick="saveSwim()">💾 保存</button>
    </div>
  </div>
</div>

<!-- ==================== 总览页 ==================== -->

  <div class="card">
    <h2>📊 成绩总览</h2>

  </div>
</div>

// ========== DATA STORE ==========
const STORE_KEY = 'swim_scorer_data';
let DB = { students: [] };
function saveDB() { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }
function loadDB() {
  const raw = localStorage.getItem(STORE_KEY);
  if (raw) { try { DB = JSON.parse(raw); } catch(e) { DB = { students: [] }; } }
  if (!DB.students) DB.students = [];
}
loadDB();

// ========== HELPERS ==========
function $(id) { return document.getElementById(id); }
function timeToSec(t) {
  if (typeof t === 'number') return t;
  if (!t || t === '') return null;
  t = String(t).trim();
  const m = t.match(/^(\d+)[\'′](\d+)[\"″]?$/);
  if (m) return parseInt(m[1]) * 60 + parseInt(m[2]);
  const s = parseFloat(t);
  return isNaN(s) ? null : s;
}
function secToTime(s) {
  if (s === null || s === undefined) return '';
  const m = Math.floor(s / 60);
  const sec = Math.round(s % 60);
  return m > 0 ? `${m}'${String(sec).padStart(2,'0')}"` : `${sec}"`;
}

// Lookup: for time-based (lower=better), find first row where value <= threshold
function scoreTime(value, table) {
  if (value === null || value === undefined || value === '') return 0;
  for (const [threshold, score] of table) {
    if (value <= threshold) return score;
  }
  return 0;
}
// For count/distance (higher=better), find first row where value >= threshold
function scoreCount(value, table) {
  if (value === null || value === undefined || value === '') return 0;
  for (const [threshold, score] of table) {
    if (value >= threshold) return score;
  }
  return 0;
}

// ========== NAVIGATION ==========
document.getElementById('nav').addEventListener('click', function(e) {
  if (e.target.tagName !== 'BUTTON') return;
  const page = e.target.dataset.page;
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('page-' + page).classList.add('active');
  if (page === 'students') renderStudents();
  if (page === 'attendance') populateStudentSelect('attStudent');
  if (page === 'fitness') populateStudentSelect('fitStudent');
  if (page === 'swim') populateStudentSelect('swimStudent');
  if (page === 'overview') renderOverview();
});

// ========== STUDENT MANAGEMENT ==========
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
      if (rows.length < 2) { alert('Excel 文件为空'); return; }
      const header = rows[0].map(h => String(h || '').trim());
      const colClass = header.findIndex(h => h.includes('班级'));
      const colName = header.findIndex(h => h.includes('姓名'));
      const colSid = header.findIndex(h => h.includes('学号'));
      const colGender = header.findIndex(h => h.includes('性别'));
      if (colClass < 0 || colName < 0 || colSid < 0) {
        alert('表头需要包含"班级、姓名、学号"列，当前表头: ' + header.join(', '));
        return;
      }
      let imported = 0;
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r || !r[colName]) continue;
        const sid = String(r[colSid] || '').trim();
        if (DB.students.find(s => s.sid === sid)) continue;
        let gender = '男';
        if (colGender >= 0) {
          const g = String(r[colGender] || '').trim();
          if (g.includes('女')) gender = '女';
        }
        DB.students.push({
          id: Date.now() + '_' + Math.random().toString(36).slice(2,8),
          class: String(r[colClass] || '').trim(),
          name: String(r[colName] || '').trim(),
          sid,
          gender,
          attendance: [],
          fitness: {},
          swim: {},
          sunny: null
        });
        imported++;
      }
      saveDB();
      $('importPreview').innerHTML = `<div class="card" style="background:#E8F8EE"><b>✅ 成功导入 ${imported} 名学生</b></div>`;
      $('importPreview').classList.remove('hidden');
      renderStudents();
      updateCount();
    } catch(err) {
      alert('解析失败: ' + err.message);
    }
  };
  reader.readAsBinaryString(file);
}

function addStudent() {
  const cls = $('mClass').value.trim();
  const name = $('mName').value.trim();
  const sid = $('mSid').value.trim();
  const gender = $('mGender').value;
  if (!cls || !name || !sid) { $('addMsg').textContent = '请填写所有字段'; return; }
  if (DB.students.find(s => s.sid === sid)) { $('addMsg').textContent = '学号重复'; return; }
  DB.students.push({
    id: Date.now() + '_' + Math.random().toString(36).slice(2,8),
    class: cls, name, sid, gender, attendance: [], fitness: {}, swim: {}, sunny: null
  });
  saveDB();
  $('mClass').value = $('mName').value = $('mSid').value = '';
  $('addMsg').textContent = '';
  renderStudents();
  updateCount();
}

function removeStudent(id) {
  if (!confirm('确定删除该学生？所有成绩数据将一并删除。')) return;
  DB.students = DB.students.filter(s => s.id !== id);
  saveDB();
  renderStudents();
  updateCount();
}

function clearAll() {
  if (!confirm('确定清空全部学生和成绩数据？此操作不可恢复！')) return;
  DB.students = [];
  saveDB();
  renderStudents();
  updateCount();
}

function renderStudents() {
  const tbody = $('studentTbody');
  if (DB.students.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text2);padding:24px">暂无学生，请导入或手动添加</td></tr>';
  } else {

      <tr>
        <td>${esc(s.class)}</td><td>${esc(s.name)}</td><td>${esc(s.sid)}</td>

        <td><button class="btn btn-danger btn-sm" onclick="removeStudent('${s.id}')">删除</button></td>

function updateCount() {
  $('studentCount').textContent = `${DB.students.length} 名学生`;
}

function populateStudentSelect(elId) {
  const sel = $(elId);
  const cur = sel.value;
  sel.innerHTML = '<option value="">-- 请选择 --</option>' +
    DB.students.map(s => `<option value="${s.id}">${esc(s.class)} - ${esc(s.name)} (${esc(s.sid)})</option>`).join('');

function getStudent(id) { return DB.students.find(s => s.id === id); }
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ========== ATTENDANCE ==========
function loadAttendance() {
  const sid = $('attStudent').value;
  const s = getStudent(sid);
  if (!s) { $('attContent').classList.add('hidden'); return; }
  $('attContent').classList.remove('hidden');
  $('attTitle').textContent = `${esc(s.name)} (${esc(s.sid)}) - 考勤`;
  renderAttStats(s);
  renderAttLog(s);
  $('attDate').value = new Date().toISOString().split('T')[0];
}

function addAttendance() {
  const sid = $('attStudent').value;
  const s = getStudent(sid);
  if (!s) return;
  const type = $('attType').value;
  const date = $('attDate').value;
  const note = $('attNote').value.trim();
  if (!date) { alert('请选择日期'); return; }
  s.attendance = s.attendance || [];
  s.attendance.push({ type, date, note });
  saveDB();
  $('attNote').value = '';
  renderAttStats(s);
  renderAttLog(s);
}

function removeAttendance(sid, idx) {
  const s = getStudent(sid);
  if (!s) return;
  s.attendance.splice(idx, 1);
  saveDB();
  renderAttStats(s);
  renderAttLog(s);
}

function calcAttendance(s) {
  const att = s.attendance || [];
  let score = 10;
  let kuang = 0, bing = 0, shi = 0, gong = 0, jianxi = 0;
  for (const a of att) {
    if (a.type === '旷课') { kuang++; score -= 5; }
    else if (a.type === '病假') { bing++; if (bing===2) score-=1; else if (bing===3) score-=3; else if (bing>=4) score-=5; }
    else if (a.type === '事假') { shi++; score -= 2; }
    else if (a.type === '公假') { gong++; }
    else if (a.type === '见习') { jianxi++; }
  }
  const nonOfficial = kuang + bing + shi;
  const disqualified = nonOfficial >= 5;
  return { score: Math.max(0, score), kuang, bing, shi, gong, jianxi, nonOfficial, disqualified };
}

function renderAttStats(s) {
  const a = calcAttendance(s);
  $('attStats').innerHTML = `
    <div class="stat-card"><div class="num" style="color:${a.disqualified?'var(--danger)':'var(--primary)'}">${a.score}</div><div class="label">考勤得分/10</div></div>
    <div class="stat-card"><div class="num">${a.kuang}</div><div class="label">旷课</div></div>
    <div class="stat-card"><div class="num">${a.bing}</div><div class="label">病假</div></div>
    <div class="stat-card"><div class="num">${a.shi}</div><div class="label">事假</div></div>
    <div class="stat-card"><div class="num">${a.gong}</div><div class="label">公假</div></div>
    <div class="stat-card"><div class="num">${a.jianxi}</div><div class="label">见习</div></div>
    ${a.disqualified?'<div class="stat-card"><div class="num" style="color:var(--danger)">⚠️</div><div class="label" style="color:var(--danger)">取消考试资格</div></div>':''}
  `;
}

function renderAttLog(s) {
  const att = s.attendance || [];
  if (att.length === 0) {
    $('attLog').innerHTML = '<div style="color:var(--text2);padding:12px;text-align:center">暂无记录</div>';
    return;
  }
  $('attLog').innerHTML = att.map((a,i) => `
    <div class="row">
      <span><span class="tag ${a.type==='旷课'?'tag-danger':a.type==='见习'?'tag-info':'tag-warn'}">${a.type}</span> ${a.date} ${a.note?esc(a.note):''}</span>
      <span class="remove-btn" onclick="removeAttendance('${s.id}',${i})">✕</span>
    </div>`).join('');
}

// ========== FITNESS ==========
function loadFitness() {
  const sid = $('fitStudent').value;
  const s = getStudent(sid);
  if (!s) { $('fitContent').classList.add('hidden'); return; }
  $('fitContent').classList.remove('hidden');
  $('fitTitle').textContent = `${esc(s.name)} (${esc(s.sid)}) - 身体素质`;
  s.fitness = s.fitness || {};
  const f = s.fitness;
  let html = '';
  if (s.gender === '女') {
    html += fieldRow('800m跑', 'f_800m', f.f_800m, '秒，如 3\'30" 或 210');
    html += fieldRow('仰卧起坐', 'f_situp', f.f_situp, '个');
    html += fieldRow('50m跑', 'f_50m', f.f_50m, '秒，如 7.5');
    html += fieldRow('立定跳远', 'f_lj', f.f_lj, 'cm');
  } else {
    html += fieldRow('1000m跑', 'f_1000m', f.f_1000m, '秒，如 3\'27" 或 207');
    html += fieldRow('引体向上', 'f_pullup', f.f_pullup, '个');
    html += fieldRow('50m跑', 'f_50m', f.f_50m, '秒，如 6.7');
    html += fieldRow('立定跳远', 'f_lj', f.f_lj, 'cm');
  }
  $('fitInputs').innerHTML = html;
}

function fieldRow(label, key, val, placeholder) {
  return `<div class="form-row" style="margin-bottom:8px">
    <div style="flex:0 0 100px"><label>${label}</label></div>
    <div><input id="${key}" value="${val||''}" placeholder="${placeholder||''}"></div>
    <div style="flex:0 0 80px"><span style="font-size:13px;color:var(--text2)" id="${key}_score"></span></div>
  </div>`;
}

function saveFitness() {
  const sid = $('fitStudent').value;
  const s = getStudent(sid);
  if (!s) return;
  s.fitness = s.fitness || {};
  if (s.gender === '女') {
    s.fitness.f_800m = $('f_800m').value.trim();
    s.fitness.f_situp = $('f_situp').value.trim();
    s.fitness.f_50m = $('f_50m').value.trim();
    s.fitness.f_lj = $('f_lj').value.trim();
  } else {
    s.fitness.f_1000m = $('f_1000m').value.trim();
    s.fitness.f_pullup = $('f_pullup').value.trim();
    s.fitness.f_50m = $('f_50m').value.trim();
    s.fitness.f_lj = $('f_lj').value.trim();
  }
  saveDB();
  // Calc scores
  const scores = calcFitness(s);
  $('fitInputs').querySelectorAll('[id$="_score"]').forEach(el => {
    const key = el.id.replace('_score','');
    el.textContent = scores[key] !== undefined ? scores[key].toFixed(1) + '分' : '';
  });
  alert('✅ 已保存');
}

function calcFitness(s) {
  const f = s.fitness || {};
  const result = {};
  if (s.gender === '女') {
    result.f_800m = scoreTime(timeToSec(f.f_800m), FEMALE_800M);
    result.f_situp = scoreCount(parseFloat(f.f_situp), FEMALE_SITUPS);
    result.f_50m = scoreTime(parseFloat(f.f_50m), FEMALE_50M);
    result.f_lj = scoreCount(parseFloat(f.f_lj), FEMALE_LJ);
  } else {
    result.f_1000m = scoreTime(timeToSec(f.f_1000m), MALE_1000M);
    result.f_pullup = scoreCount(parseFloat(f.f_pullup), MALE_PULLUPS);
    result.f_50m = scoreTime(parseFloat(f.f_50m), MALE_50M);
    result.f_lj = scoreCount(parseFloat(f.f_lj), MALE_LJ);
  }
  result.total = Object.values(result).reduce((a,b) => a + b, 0);
  return result;
}

// ========== SWIM ==========
function loadSwim() {
  const sid = $('swimStudent').value;
  const s = getStudent(sid);
  if (!s) { $('swimContent').classList.add('hidden'); return; }
  $('swimContent').classList.remove('hidden');
  $('swimTitle').textContent = `${esc(s.name)} (${esc(s.sid)}) - 游泳专项`;
  s.swim = s.swim || {};
  const sw = s.swim;
  const html = `
    <div class="form-row"><div style="flex:0 0 120px"><label>25m蛙泳腿</label></div>
      <div><input id="sw_25m" value="${sw.sw_25m||''}" placeholder="秒，如 28"></div>
      <div style="flex:0 0 60px"><span style="font-size:13px;color:var(--text2)" id="sw_25m_score"></span></div></div>
    <div class="form-row"><div style="flex:0 0 120px"><label>50m蛙泳</label></div>
      <div><input id="sw_50m" value="${sw.sw_50m||''}" placeholder="${s.gender==='女'?'秒，如 65':'秒，如 60'}"></div>
      <div style="flex:0 0 60px"><span style="font-size:13px;color:var(--text2)" id="sw_50m_score"></span></div></div>
    <div class="form-row"><div style="flex:0 0 120px"><label>技术评定</label></div>
      <div><input id="sw_tech" value="${sw.sw_tech||''}" placeholder="0-10分，手动打分"></div></div>
    <div class="form-row"><div style="flex:0 0 120px"><label>阳光长跑</label></div>
      <div><input id="sw_sunny" value="${s.sunny||''}" placeholder="0-10分，手动输入"></div></div>
  `;
  $('swimInputs').innerHTML = html;
}

function saveSwim() {
  const sid = $('swimStudent').value;
  const s = getStudent(sid);
  if (!s) return;
  s.swim = s.swim || {};
  s.swim.sw_25m = $('sw_25m').value.trim();
  s.swim.sw_50m = $('sw_50m').value.trim();
  s.swim.sw_tech = parseFloat($('sw_tech').value) || 0;
  s.sunny = parseFloat($('sw_sunny').value) || 0;
  saveDB();
  const scores = calcSwim(s);
  $('sw_25m_score').textContent = scores.sw25 + '分';
  $('sw_50m_score').textContent = scores.sw50perf + '分';
  alert('✅ 已保存');
}

function calcSwim(s) {
  const sw = s.swim || {};
  const table25 = s.gender === '女' ? SWIM_25M_F : SWIM_25M;
  const table50 = s.gender === '女' ? SWIM_50M_F : SWIM_50M;
  const sw25Raw = scoreTime(parseFloat(sw.sw_25m), table25);
  const sw50Raw = scoreTime(parseFloat(sw.sw_50m), table50);
  // Map 50m raw 18-30 → 30 points
  const sw50perf = sw50Raw > 0 ? Math.round((sw50Raw / 30) * 30) : 0;
  const swTech = Math.min(10, Math.max(0, parseFloat(sw.sw_tech) || 0));
  const sw25 = sw25Raw; // 1:1 mapping, max 10
  return { sw25, sw50perf, swTech, sunny: Math.min(10, Math.max(0, s.sunny || 0)) };
}

function calcTotal(s) {
  const att = calcAttendance(s);
  const fit = calcFitness(s);
  const swim = calcSwim(s);
  return {
    att: att.score,
    fit: fit.total,
    sw25: swim.sw25,
    sw50: swim.sw50perf + swim.swTech,
    sunny: swim.sunny,
    total: att.score + fit.total + swim.sw25 + swim.sw50perf + swim.swTech + swim.sunny,
    disqualified: att.disqualified
  };
}

// ========== OVERVIEW ==========
function renderOverview() {
  const thead = $('overviewTable').querySelector('thead');
  const tbody = $('overviewTable').querySelector('tbody');

  thead.innerHTML = `<tr>
    <th>班级</th><th>姓名</th><th>学号</th><th>性别</th>
    <th>考勤</th><th>身体素质</th><th>25m蛙腿</th><th>50m蛙泳</th><th>阳光长跑</th>
    <th>总分</th><th>状态</th>
  </tr>`;

  if (DB.students.length === 0) {
    tbody.innerHTML = '<tr><td colspan="11" style="padding:24px;color:var(--text2)">暂无数据</td></tr>';
  } else {
    tbody.innerHTML = DB.students.map(s => {
      const t = calcTotal(s);
      return `<tr class="${t.disqualified?'disqualified':''}">
        <td>${esc(s.class)}</td><td>${esc(s.name)}</td><td>${esc(s.sid)}</td><td>${s.gender}</td>
        <td>${t.att}</td><td>${t.fit.toFixed(1)}</td><td>${t.sw25}</td><td>${t.sw50}</td><td>${t.sunny}</td>
        <td><b class="${t.total>=60?'score-good':'score-bad'}">${t.total.toFixed(1)}</b></td>
        <td>${t.disqualified?'<span class="tag tag-danger">取消资格</span>':'<span class="tag tag-info">正常</span>'}</td>
      </tr>`;
    }).join('');
  }
  refreshStats();
}

function refreshStats() {
  const group = $('statGroup').value;
  let students = DB.students;
  if (students.length === 0) { $('statsGrid').innerHTML = '<div style="padding:12px;color:var(--text2)">暂无数据</div>'; return; }

  let groups = {};
  if (group === 'class') {
    for (const s of students) {
      const c = s.class || '未分组';
      if (!groups[c]) groups[c] = [];
      groups[c].push(s);
    }
  } else {
    groups['全部'] = students;
  }

  let html = '';
  for (const [name, list] of Object.entries(groups)) {
    const totals = list.map(s => calcTotal(s).total);
    const avg = totals.reduce((a,b)=>a+b,0) / totals.length;
    const max = Math.max(...totals);
    const min = Math.min(...totals);
    const pass = totals.filter(t=>t>=60).length;
    const dq = list.filter(s => calcAttendance(s).disqualified).length;
    html += `<div class="card" style="margin-bottom:8px">
      <h3 style="margin-bottom:8px">${esc(name)} (${list.length}人)</h3>
      <div class="stats-grid">
        <div class="stat-card"><div class="num">${avg.toFixed(1)}</div><div class="label">平均分</div></div>
        <div class="stat-card"><div class="num">${max.toFixed(0)}</div><div class="label">最高分</div></div>
        <div class="stat-card"><div class="num">${min.toFixed(0)}</div><div class="label">最低分</div></div>
        <div class="stat-card"><div class="num">${pass}</div><div class="label">及格(≥60)</div></div>
        <div class="stat-card"><div class="num">${(pass/list.length*100).toFixed(0)}%</div><div class="label">及格率</div></div>
        ${dq>0?`<div class="stat-card"><div class="num" style="color:var(--danger)">${dq}</div><div class="label" style="color:var(--danger)">取消资格</div></div>`:''}
      </div>
    </div>`;
  }
  $('statsGrid').innerHTML = html;
}

// ========== EXPORT ==========
function exportExcel() {
  const rows = [['班级','姓名','学号','性别','考勤得分','身体素质','25m蛙泳腿','50m蛙泳','阳光长跑','总分','状态']];
  for (const s of DB.students) {
    const t = calcTotal(s);
    rows.push([s.class, s.name, s.sid, s.gender, t.att, t.fit.toFixed(1), t.sw25, t.sw50, t.sunny, t.total.toFixed(1), t.disqualified?'取消考试资格':'正常']);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '成绩总览');
  XLSX.writeFile(wb, '游泳课成绩.xlsx');
}

// ========== DATA BACKUP ==========
function exportData() {
  const data = JSON.stringify(DB, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `游泳课成绩_备份_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('importMsg').textContent = '✅ 导出成功，文件已下载';
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.students || !Array.isArray(data.students)) {
        alert('❌ 文件格式错误，不是有效的备份文件');
        return;
      }
      const count = data.students.length;
      if (!confirm(`即将导入 ${count} 名学生的数据，覆盖当前全部 ${DB.students.length} 条数据。确定？`)) return;
      DB = data;
      saveDB();
      renderStudents();
      updateCount();
      $('importMsg').textContent = `✅ 成功导入 ${count} 名学生数据`;
      event.target.value = '';
    } catch(err) {
      alert('❌ 解析失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ========== INIT ==========
updateCount();
renderStudents();
</script>
